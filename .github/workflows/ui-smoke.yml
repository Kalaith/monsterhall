name: UI Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  ui-smoke:
    runs-on: [self-hosted, windows, ui]
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python UI test dependencies
        run: python -m pip install --upgrade pip pillow pywin32

      - name: Run UI smoke test
        run: .\scripts\run_ui_smoke_test.ps1

      - name: Upload UI smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-artifacts
          path: |
            tmp_screens/playtests/current
            tmp_screens/playtests/diff
            tmp_screens/playtests/report.json
